# A minimal, security-disabled Elasticsearch and Kibana configuration
# Only use this for running esdiag on a local machine!
#
# Ensure you've allocated Docker at least 8 GB of memory and as many
# CPU cores as you can spare for faster ingest performance.

name: esdiag
services:
  esdiag-elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.17.1
    container_name: esdiag-elasticsearch
    environment:
      - node.name=esdiag-node
      - cluster.name=esdiag-cluster
      - cluster.initial_master_nodes=esdiag-node
      - xpack.security.enabled=false
      - bootstrap.memory_lock=true
      - "ES_JAVA_OPTS=-Xms4g -Xmx4g"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - esdiag-data:/usr/share/elasticsearch/data
    ports:
      - 9200:9200
    networks:
      - esdiag-net
  esdiag-kibana:
    image: docker.elastic.co/kibana/kibana:8.17.1
    container_name: esdiag-kibana
    depends_on:
      - esdiag-elasticsearch
    environment:
      ELASTICSEARCH_HOSTS: http://esdiag-elasticsearch:9200
    networks:
      - esdiag-net
    ports:
      - 5601:5601

volumes:
  esdiag-data:
    driver: local

networks:
  esdiag-net:
    driver: bridge
