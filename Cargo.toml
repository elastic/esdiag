[package]
name = "esdiag"
version = "0.3.2"
edition = "2021"
rust-version = "1.80"

[dependencies]
base64 = "0.22.1"
chrono = "^0.4"
clap = { version = "^4.5", features = ["derive"] }
color-eyre = "0.6.3"
elasticsearch = "8.17.0-alpha.1"
env_logger = { version = "^0.11" }
futures = "^0.3"
include_dir = "^0.7"
json-patch = "^1.2"
log = "^0.4"
rayon = "^1.10"
regex = "^1.10.5"
reqwest = "^0.12"
semver = { version = "^1.0.23", features = ["serde"] }
serde = { version = "^1.0.199", features = ["derive", "rc"] }
serde_json = "^1.0.116"
serde_yaml = "^0.9.34"
tokio = { version = "^1.38.0", features = ["full"] }
url = { version = "^2.5.0", features = ["serde"] }
uuid = { version = "^1.8.0", features = ["v4", "fast-rng"] }
zip = "^2.1.3"
