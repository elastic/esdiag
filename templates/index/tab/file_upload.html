<div id="tab-content" class="tab-content">
    <form id="upload-form" data-signals-uploading="false" enctype="multipart/form-data">
        <p class="info">Upload a file from your local computer</p>
        <input
            type="file"
            id="file-input"
            data-show="true"
            data-bind-files
            data-computed-file_selected="$files && $files.length > 0"
            name="file"
            accept=".zip"
            required
            value=""
        />
        <div id="drop-area" class="drop-area">
            <div class="file-icon">
                <!--- upload icon -->
                <svg
                    data-show="!$file_selected"
                    xmlns="http://www.w3.org/2000/svg"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                >
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                    <polyline points="14 2 14 8 20 8"></polyline>
                    <line x1="12" y1="18" x2="12" y2="12"></line>
                    <line x1="9" y1="15" x2="15" y2="15"></line>
                </svg>
                <!--- checkmark icon -->
                <svg
                    data-show="$file_selected"
                    style="color: #0b64dd"
                    xmlns="http://www.w3.org/2000/svg"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                >
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                    <polyline points="14 2 14 8 20 8"></polyline>
                    <path d="M9 15L11 17L15 13"></path>
                </svg>
            </div>
            <div id="upload-instructions" data-show="!$file_selected">
                <p>
                    Select or drag and drop a
                    <code>.zip</code> file
                </p>
            </div>
            <div id="file-info" class="file-info" data-show="$file_selected">
                <span id="file-name" class="file-name" data-text="$filesNames[0] || ''"></span>
                <span
                    id="clear-file"
                    class="clear-button"
                    data-on-click="$files = []; $filesNames = []; $filesMimes = []"
                    >✕
                </span>
            </div>
            <div id="upload-progress-container" data-show="$uploading" class="upload-progress-container">
                <div id="upload-progress-bar" class="upload-progress-bar"></div>
            </div>
            <div id="upload-progress-text" class="upload-progress-text">0%</div>
        </div>
        <input
            id="upload-button"
            data-on-click="@post('/upload', {contentType: 'form'})"
            data-attr-disabled="$uploading || !$file_selected"
            data-attr-value="$uploading ? 'Uploading' : '&nbsp;Upload&nbsp;'"
            class="button"
            type="submit"
        />
    </form>
    <script>
        // File upload handling
        const dropArea = document.getElementById("drop-area");

        // Prevent default drag behaviors
        ["dragenter", "dragover", "dragleave", "drop"].forEach((eventName) => {
            dropArea.addEventListener(eventName, preventDefaults, false);
            document.body.addEventListener(eventName, preventDefaults, false);
        });

        function preventDefaults(e) {
            e.preventDefault();
            e.stopPropagation();
        }

        // Highlight drop area when item is dragged over it
        ["dragenter", "dragover"].forEach((eventName) => {
            dropArea.addEventListener(eventName, highlight, false);
        });

        ["dragleave", "drop"].forEach((eventName) => {
            dropArea.addEventListener(eventName, unhighlight, false);
        });

        function highlight() {
            dropArea.classList.add("drag-over");
        }

        function unhighlight() {
            dropArea.classList.remove("drag-over");
        }

        dropArea.addEventListener("drop", handleDrop, false);

        // Handle dropped files
        const fileInput = document.getElementById("file-input");

        function handleDrop(e) {
            const files = e.dataTransfer.files;
            console.log(files);
            fileInput.files = files;
        }

        // HTMX upload event handlers
        document.addEventListener("htmx:beforeRequest", function (evt) {
            if (evt.detail.target.id === "upload-result") {
                updateStatus({ status: "uploading" });

                // Show progress elements
                progressContainer.classList.add("active");
                progressText.classList.add("active");
            }
        });

        document.addEventListener("htmx:afterRequest", function (evt) {
            if (evt.detail.target.id === "upload-result") {
                const progressContainer = document.getElementById("upload-progress-container");
                const progressText = document.getElementById("upload-progress-text");
                const progressBar = document.getElementById("upload-progress-bar");

                // Hide progress elements after upload
                setTimeout(() => {
                    progressContainer.classList.remove("active");
                    progressText.classList.remove("active");
                    progressBar.style.width = "0%";
                    progressText.textContent = "0%";
                }, 1000);
            }
        });

        document.addEventListener("htmx:responseError", function (evt) {
            if (evt.detail.target.id === "upload-result") {
                const progressContainer = document.getElementById("upload-progress-container");
                const progressText = document.getElementById("upload-progress-text");

                // Hide progress elements on error
                progressContainer.classList.remove("active");
                progressText.classList.remove("active");
                document.getElementById("drop-area").style.pointerEvents = "";
            }
        });
    </script>
</div>
