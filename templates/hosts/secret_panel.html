<panel
    id="secrets-table-panel"
    data-signals='{
        secrets: {
            rows: {}
        }
    }'
>
    <h3 style="margin-top: 0">Secrets</h3>
    {% if keystore_locked %}
    <info-text>Unlock the keystore from the user menu to view and edit secrets.</info-text>
    {% endif %}
    <table-records id="secrets-table">
        <table>
            <thead>
                <tr>
                    <th scope="col" class="secret-id-column">Secret ID</th>
                    <th scope="col" class="secret-type-column">Type</th>
                    <th scope="col" class="secret-value-column">Secret</th>
                    <th scope="col">Actions</th>
                </tr>
            </thead>
            <tbody id="secrets-table-body">
                {{ rows_html|safe }}
            </tbody>
        </table>
    </table-records>
    <footer>
        {% if keystore_locked %}
        <button type="button" data-on:click="@get('/keystore/modal')">Unlock</button>
        {% else %}
        <button type="button" data-on:click="if (confirm('Lock keystore and disable secret usage?')) { @post('/keystore/lock'); }">Lock</button>
        {% endif %}
        <button type="button" {% if keystore_locked %}disabled{% endif %} data-on:click="@post('/hosts/secret/create/new')">Add Secret</button>
    </footer>
</panel>
