<tr id="hosts-table-row-{{ row_id }}" data-host-name="{{ host.name }}">
    {% if editing %}
    <td><form-input><input data-bind:hosts.rows.{{ row_id }}.draft.name placeholder="name" /></form-input></td>
    <td class="host-product-column">
        <form-input>
            <select data-bind:hosts.rows.{{ row_id }}.draft.app>
                <option value="Elasticsearch" {% if host.app == "Elasticsearch" %}selected{% endif %}>Elasticsearch</option>
                <option value="Kibana" {% if host.app == "Kibana" %}selected{% endif %}>Kibana</option>
                <option value="Logstash" {% if host.app == "Logstash" %}selected{% endif %}>Logstash</option>
                <option value="Agent" {% if host.app == "Agent" %}selected{% endif %}>Agent</option>
                <option value="ECE" {% if host.app == "ECE" %}selected{% endif %}>ECE</option>
                <option value="ECK" {% if host.app == "ECK" %}selected{% endif %}>ECK</option>
                <option value="ElasticCloudHosted" {% if host.app == "ElasticCloudHosted" %}selected{% endif %}>ElasticCloudHosted</option>
                <option value="KubernetesPlatform" {% if host.app == "KubernetesPlatform" %}selected{% endif %}>KubernetesPlatform</option>
            </select>
        </form-input>
    </td>
    <td>
        <form-input>
            <select
                data-bind:hosts.rows.{{ row_id }}.draft.secret
            >
                <option value="">-none-</option>
                {% for secret_id in secret_ids %}
                <option value="{{ secret_id }}" {% if host.secret.as_str() == secret_id.as_str() %}selected{% endif %}>{{ secret_id }}</option>
                {% endfor %}
            </select>
        </form-input>
    </td>
    <td>
        <choice-row>
            <input
                type="checkbox"
                {% if !host.accept_invalid_certs %}checked{% endif %}
                data-attr:checked="(!$hosts.rows.{{ row_id }}.draft.accept_invalid_certs) || null"
                data-on:change="$hosts.rows.{{ row_id }}.draft.accept_invalid_certs = !evt.target.checked"
            />
            <label>Secure</label>
        </choice-row>
    </td>
    <td>
        <form-input>
            <input
                type="url"
                data-bind:hosts.rows.{{ row_id }}.draft.url
                data-on:keydown="if (evt.key === 'Enter') { evt.preventDefault(); @post('/settings/host/update/{{ row_id }}', {filterSignals: {include: /^hosts\.rows\.{{ row_id }}(\.|$)/}}); }"
                required
            />
        </form-input>
    </td>
    <td>
        <button type="button" {% if keystore_locked %}disabled{% endif %} title="Save host" aria-label="Save host {{ host.name }}" data-on:click="@post('/settings/host/update/{{ row_id }}', {filterSignals: {include: /^hosts\.rows\.{{ row_id }}(\.|$)/}})">
            <icon-check></icon-check>
        </button>
        <button type="button" title="Cancel host edit" aria-label="Cancel host edit" data-on:click="@post('/settings/host/{% if persisted %}cancel{% else %}delete{% endif %}/{{ row_id }}')">
            <icon-undo></icon-undo>
        </button>
        {% if persisted %}
        <button type="button" title="Delete host" aria-label="Delete host {{ host.name }}" data-on:click="if (confirm(`Delete host ${evt.currentTarget.closest('tr').dataset.hostName}?`)) { @post('/settings/host/delete/{{ row_id }}'); }">
            <icon-trash></icon-trash>
        </button>
        {% endif %}
    </td>
    {% else %}
    <td>{{ host.name }}</td>
    <td class="host-product-column">{{ host.app }}</td>
    <td>{% if host.secret.is_empty() %}-none-{% else %}{{ host.secret }}{% endif %}</td>
    <td>{% if host.accept_invalid_certs %}<span class="certificate-status-insecure">Insecure</span>{% else %}Secure{% endif %}</td>
    <td>{{ host.url }}</td>
    <td>
        <button type="button" {% if keystore_locked %}disabled{% endif %} title="Edit host" aria-label="Edit host {{ host.name }}" data-on:click="@post('/settings/host/read/{{ row_id }}')">
            <icon-pencil></icon-pencil>
        </button>
        <button type="button" title="Delete host" aria-label="Delete host {{ host.name }}" data-on:click="if (confirm(`Delete host ${evt.currentTarget.closest('tr').dataset.hostName}?`)) { @post('/settings/host/delete/{{ row_id }}'); }">
            <icon-trash></icon-trash>
        </button>
    </td>
    {% endif %}
</tr>
