<tr id="secrets-table-row-{{ row_id }}">
    {% if editing %}
    <td class="secret-id-column">
        <input class="form-input" data-bind:secrets.rows.{{ row_id }}.draft.secret_id placeholder="secret_id" />
    </td>
    <td class="secret-type-column">
        <select class="form-input" data-bind:secrets.rows.{{ row_id }}.draft.authtype>
            <option value="ApiKey" {% if secret.auth_type == "ApiKey" %}selected{% endif %}>ApiKey</option>
            <option value="Basic" {% if secret.auth_type == "Basic" %}selected{% endif %}>Basic</option>
        </select>
    </td>
    <td class="secret-value-column">
        <div class="secret-edit-fields">
            <div data-show="$secrets.rows.{{ row_id }}.draft.authtype === 'ApiKey'" style="display:none">
                <input class="form-input" data-bind:secrets.rows.{{ row_id }}.draft.apikey placeholder="API key" />
            </div>
            <div data-show="$secrets.rows.{{ row_id }}.draft.authtype === 'Basic'" class="secret-basic-fields" style="display:none">
                <input class="form-input" data-bind:secrets.rows.{{ row_id }}.draft.username placeholder="Username" />
                <input type="password" class="form-input" data-bind:secrets.rows.{{ row_id }}.draft.password placeholder="Password" />
            </div>
        </div>
    </td>
    <td>
        <button type="button" {% if keystore_locked %}disabled{% endif %} title="Save secret" aria-label="Save secret {{ secret.secret_id }}" data-on:click="if (confirm('Save will overwrite the stored value for {{ secret.secret_id }}.')) { @post('/hosts/secret/update/{{ row_id }}'); }">
            <icon-check></icon-check>
        </button>
        <button type="button" title="Cancel secret edit" aria-label="Cancel secret edit" data-on:click="@post('/hosts/secret/{% if persisted %}cancel{% else %}delete{% endif %}/{{ row_id }}')">
            <icon-undo></icon-undo>
        </button>
        {% if persisted %}
        <button type="button" {% if keystore_locked %}disabled{% endif %} title="Delete secret" aria-label="Delete secret {{ secret.secret_id }}" data-on:click="if (confirm('Delete {{ secret.secret_id }} from the keystore?')) { @post('/hosts/secret/delete/{{ row_id }}'); }">
            <icon-trash></icon-trash>
        </button>
        {% endif %}
    </td>
    {% else %}
    <td class="secret-id-column">{{ secret.secret_id }}</td>
    <td class="secret-type-column">{{ secret.auth_type }}</td>
    <td class="secret-value-column">
        {% if secret.auth_type == "ApiKey" %}
        <span class="secret-redacted">············</span>
        {% else if secret.auth_type == "Basic" %}
        <span class="secret-redacted">{% if !secret.username.is_empty() %}{{ secret.username }}:{% endif %}······</span>
        {% endif %}
    </td>
    <td>
        <button type="button" {% if keystore_locked %}disabled{% endif %} title="Edit secret" aria-label="Edit secret {{ secret.secret_id }}" data-on:click="@post('/hosts/secret/read/{{ row_id }}')">
            <icon-pencil></icon-pencil>
        </button>
        <button type="button" {% if keystore_locked %}disabled{% endif %} title="Delete secret" aria-label="Delete secret {{ secret.secret_id }}" data-on:click="if (confirm('Delete {{ secret.secret_id }} from the keystore?')) { @post('/hosts/secret/delete/{{ row_id }}'); }">
            <icon-trash></icon-trash>
        </button>
    </td>
    {% endif %}
</tr>
