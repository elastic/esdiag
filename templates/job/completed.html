<div id="job-{{ job_id }}" class="status-box history-item success">
    ✅ Processing complete!
    <p>
        <b>Diagnostic ID:</b>
        <a target="_blank" href="{{ kibana_link }}">{{ diagnostic_id }}</a>
    </p>
    <p><b>Source:</b> {{ source }}</p>
    <p><b>Product:</b> {{ product }}</p>
    <p><b>Ingested:</b> {{ docs_created }} documents in {{ duration }} seconds</p>
</div>
