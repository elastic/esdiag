<div id="keystore-process-unlock-modal" class="modal">
    <div class="modal-content">
        <button
            type="button"
            class="close-button"
            aria-label="Close keystore unlock"
            data-on:click="$_pending_job_action = ''; document.getElementById('keystore-process-unlock-modal')?.remove()"
        >
            <icon-x></icon-x>
        </button>
        <h2>Unlock Keystore</h2>
        <p>Unlock the keystore to continue with the selected secure job action or output target.</p>
        <form
            id="keystore-process-unlock-form"
            data-on:submit__prevent="{
                const jobDraft = typeof $job === 'undefined' ? null : $job;
                const archive = typeof $archive === 'undefined' ? null : $archive;
                if (jobDraft && archive && jobDraft.collect.save && !(jobDraft.collect.mode === 'upload' && jobDraft.collect.source === 'upload-file')) {
                    const token = archive.download_token || crypto.randomUUID();
                    $archive.download_token = token;
                    $archive.pending_token = token;
                    $archive.ready_token = '';
                    $archive.status = 'waiting';
                    $archive.error = '';
                }
                @post('/keystore/unlock', {contentType: 'form'});
            }"
        >
            <input-group>
                <label for="keystore-process-password" class="form-label">Keystore Password</label>
                <input
                    type="password"
                    id="keystore-process-password"
                    name="password"
                    data-bind:keystore.password
                    data-class:error="$keystore.invalid"
                    data-on:input="$keystore.invalid = false"
                    class="form-input"
                    autocomplete="current-password"
                    required
                />
            </input-group>
            <form-actions>
                <input class="button" type="submit" value="Unlock and Continue" />
                <button
                    type="button"
                    class="button is-neutral"
                    data-on:click="$_pending_job_action = ''; document.getElementById('keystore-process-unlock-modal')?.remove()"
                >
                    Cancel
                </button>
            </form-actions>
        </form>
    </div>
</div>
