name: Docker Image CI

on:
  push:
    branches: [ "main", "*docker-build*" ]
    paths-ignore:
      # - '.github/**'
      - '*.md'
      - '.env*'
      - '.gitignore'
      - '.gitattributes'
      - '.editorconfig'
      - '.dockerignore'
      # - 'scripts/**'
    # types:
    #   - opened
    #   - synchronize
  pull_request:
    branches: [ "main" ]
    paths-ignore:
      # - '.github/**'
      - '*.md'
      - '.env*'
      - '.gitignore'
      - '.gitattributes'
      - '.editorconfig'
      - '.dockerignore'
      - 'scripts/**'
    types:
      - opened
      - synchronize

jobs:
  docker-build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        platform:
          - linux/amd64
          - linux/arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          ## Dev Registry
          registry: docker.elastic.co/employees
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: docker.elastic.co/employees/adrianchen-es/esdiag
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=raw,value=dev

      - name: Optimize build for available CPU cores
        run: |
          echo "Detecting available CPU cores on GitHub runner..."
          CPU_CORES=$(nproc 2>/dev/null || getconf _NPROCESSORS_ONLN 2>/dev/null || echo "4")
          echo "Available CPU cores: $CPU_CORES"
          echo "DOCKER_BUILDKIT_INLINE_CACHE=1" >> $GITHUB_ENV
          echo "BUILDX_CONFIG=/tmp/.buildx" >> $GITHUB_ENV

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          driver: docker-container
          context: .
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILDKIT_INLINE_CACHE=1
          cache-from: type=gha
          cache-to: type=gha,mode=max
          outputs: type=image,name=docker.elastic.co/employees/adrianchen-es/esdiag,push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Generate artifact name
        id: artifact
        run: |
          # Convert platform to safe artifact name
          PLATFORM_NAME=$(echo "${{ matrix.platform }}" | sed 's/\//-/g')
          echo "name=digests-${PLATFORM_NAME}" >> $GITHUB_OUTPUT

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact.outputs.name }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    runs-on: ubuntu-latest
    needs:
      - docker-build
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.elastic.co/employees
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: docker.elastic.co/employees/adrianchen-es/esdiag
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=raw,value=dev

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf 'docker.elastic.co/employees/adrianchen-es/esdiag@sha256:%s ' *)