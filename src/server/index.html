<!doctype html>
<html>
    <head>
        <title>Elasticsearch Diagnostics Upload</title>
        <style>
            body {
                font-family:
                    "Inter", BlinkMacSystemFont, Helvetica, Arial, sans-serif;
                padding: 0px;
                margin: 0px;
            }
            code {
                background-color: rgb(246, 249, 252);
                border-radius: 4px;
                color: rgb(107, 60, 159);
                font-family: "Roboto Mono", Menlo, Courier, monospace;
                font-size: 0.9em;
                font-weight: 600;
                padding-block: 0.2em;
                padding-inline: 0.5em;
            }
            h2 {
                color: rgb(17, 28, 44);
                font-weight: 600;
                word-break: break-word;
                font-size: 1.1429rem;
                line-height: 40px;
                margin: 0px;
            }
            .header {
                display: flex;
                align-items: center;
                padding: 0px 8px;
                height: 48px;
                width: 100%;
                background-color: #0b1628;
                color: #ffffff;
            }
            .header h1 {
                display: inline-block;
                color: #ffffff;
                font-size: 1.2em;
                font-weight: 200;
                margin: 0px;
            }
            .logo {
                display: inline-block;
                vertical-align: middle;
                width: 24px;
                height: 24px;
                margin: 0px 4px 6px 8px;
            }
            .content {
                max-width: 640px;
                margin: 0 auto;
                padding: 24px 12px;
            }
            .upload-form {
                background-color: #ffffff;
                border-radius: 4px;
                border: 1px solid #e3e8f2;
                padding: 16px;
            }
            .button {
                background-color: #d1e1ff;
                border-radius: 4px;
                border: none;
                color: #1339ab;
                cursor: pointer;
                margin-top: 10px;
                padding: 10px 15px;
            }
            .button:hover {
                background-color: #b7d0fb;
            }
            .button:disabled {
                background-color: #ecebf9;
                color: #798eaf;
                cursor: not-allowed;
            }
            #status-box {
                margin-top: 12px;
            }
            .status-box {
                padding: 16px;
                border-radius: 4px;
                margin-bottom: 10px;
                max-width: 640px;
                margin: 0 auto;
            }
            .ready {
                background-color: #e3e8f2;
                color: #516381;
            }
            .success {
                background-color: #c9f3e3;
                color: #09724d;
            }
            .error {
                background-color: #fdddd8;
                color: #a71627;
            }
            .processing {
                background-color: #cfeef7;
                color: #0f658a;
            }
            .spinner {
                animation: spin 1s ease-in-out infinite;
                border-radius: 50%;
                border-top-color: #005571;
                border: 3px solid rgba(0, 85, 113, 0.3);
                display: inline-block;
                height: 20px;
                margin-right: 10px;
                vertical-align: middle;
                width: 20px;
            }
            /* Specific styling for spinner in processing state */
            .processing .spinner {
                border-top-color: #4285f4;
                border: 3px solid rgba(66, 133, 244, 0.3);
            }
            @keyframes spin {
                to {
                    transform: rotate(360deg);
                }
            }
            .drop-area {
                border-radius: 8px;
                border: 2px dashed #e3e8f2;
                cursor: pointer;
                margin-bottom: 15px;
                padding: 25px;
                position: relative;
                text-align: center;
                transition: all 0.3s ease;
            }
            .drop-area.drag-over {
                background-color: #f0f5ff;
                border-color: #1339ab;
            }
            .file-input {
                display: none;
            }
            .file-icon {
                align-items: center;
                color: #516381;
                display: flex;
                height: 60px;
                justify-content: center;
                margin: 0 auto 15px;
                width: 60px;
            }
            .file-icon svg {
                height: 40px;
                width: 40px;
            }
            .subdued {
                color: #516381;
                font-size: 0.9em;
                margin-top: 10px;
            }
            .file-info {
                align-items: center;
                background-color: rgb(246, 249, 252);
                border-radius: 4px;
                display: flex;
                justify-content: center;
                margin-top: 15px;
                padding: 8px 12px;
            }
            .file-name {
                margin-right: 10px;
                max-width: 80%;
                overflow: hidden;
                text-overflow: ellipsis;
                word-break: break-all;
            }
            .clear-button {
                align-items: center;
                border-radius: 50%;
                color: #1339ab;
                cursor: pointer;
                display: flex;
                font-weight: bold;
                height: 22px;
                justify-content: center;
                width: 22px;
            }
            .clear-button:hover {
                background-color: #b7d0fb;
            }
            .hidden {
                display: none;
            }
        </style>
    </head>

        <div class="content">
            <h2>Upload File</h2>
            <div class="upload-form">
                <form
                    id="upload-form"
                    action="/upload"
                    method="post"
                    enctype="multipart/form-data"
                >
                    <div class="drop-area" id="drop-area">
                        <div class="file-icon">
                            <svg
                                xmlns="http://www.w3.org/2000/svg"
                                viewBox="0 0 24 24"
                                fill="none"
                                stroke="currentColor"
                                stroke-width="2"
                                stroke-linecap="round"
                                stroke-linejoin="round"
                            >
                                <path
                                    d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"
                                ></path>
                                <polyline points="14 2 14 8 20 8"></polyline>
                                <line x1="12" y1="18" x2="12" y2="12"></line>
                                <line x1="9" y1="15" x2="15" y2="15"></line>
                            </svg>
                        </div>
                        <div id="upload-instructions">
                            <p>
                                Select or drag and drop a <code>.zip</code> file
                            </p>
                        </div>
                        <div id="file-info" class="file-info hidden">
                            <span id="file-name" class="file-name"></span>
                            <span id="clear-file" class="clear-button">✕</span>
                        </div>
                        <input
                            type="file"
                            name="file"
                            id="file-input"
                            class="file-input"
                            accept=".zip"
                            required
                        />
                    </div>
                    <input
                        type="submit"
                        value="Upload"
                        class="button"
                        id="upload-button"
                        disabled
                    />
                </form>
            </div>
            <div id="status-box">
                <div id="current-status" class="status-box"></div>
                <div id="history-container"></div>
            </div>
        </div>

        <script>
            // File upload handling
            const dropArea = document.getElementById("drop-area");
            const fileInput = document.getElementById("file-input");
            const fileInfo = document.getElementById("file-info");
            const fileName = document.getElementById("file-name");
            const clearFile = document.getElementById("clear-file");
            const uploadInstructions = document.getElementById(
                "upload-instructions",
            );

            // Prevent default drag behaviors
            ["dragenter", "dragover", "dragleave", "drop"].forEach(
                (eventName) => {
                    dropArea.addEventListener(
                        eventName,
                        preventDefaults,
                        false,
                    );
                    document.body.addEventListener(
                        eventName,
                        preventDefaults,
                        false,
                    );
                },
            );

            function preventDefaults(e) {
                e.preventDefault();
                e.stopPropagation();
            }

            // Highlight drop area when item is dragged over it
            ["dragenter", "dragover"].forEach((eventName) => {
                dropArea.addEventListener(eventName, highlight, false);
            });

            ["dragleave", "drop"].forEach((eventName) => {
                dropArea.addEventListener(eventName, unhighlight, false);
            });

            function highlight() {
                dropArea.classList.add("drag-over");
            }

            function unhighlight() {
                dropArea.classList.remove("drag-over");
            }

            // Handle dropped files
            dropArea.addEventListener("drop", handleDrop, false);

            function handleDrop(e) {
                const dt = e.dataTransfer;
                const files = dt.files;
                handleFiles(files);
            }

            function handleFiles(files) {
                if (files.length > 0) {
                    fileInput.files = files;
                    updateFileInfo(files[0]);
                }
            }

            function updateFileInfo(file) {
                const uploadButton = document.getElementById("upload-button");
                const fileIcon = document.querySelector(".file-icon");

                if (file) {
                    fileName.textContent = file.name;
                    fileInfo.classList.remove("hidden");
                    uploadButton.disabled = false;
                    uploadInstructions.classList.add("hidden");
                    fileIcon.style.color = "#1339ab"; // Change to button text blue

                    // Change the icon to a check mark
                    document.querySelector(".file-icon svg").innerHTML = `
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                        <polyline points="14 2 14 8 20 8"></polyline>
                        <path d="M9 15L11 17L15 13"></path>
                    `;
                } else {
                    fileInput.value = "";
                    fileInfo.classList.add("hidden");
                    uploadButton.disabled = true;
                    uploadInstructions.classList.remove("hidden");
                    fileIcon.style.color = "#516381"; // Reset to original color

                    // Reset to upload icon
                    document.querySelector(".file-icon svg").innerHTML = `
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                        <polyline points="14 2 14 8 20 8"></polyline>
                        <line x1="12" y1="18" x2="12" y2="12"></line>
                        <line x1="9" y1="15" x2="15" y2="15"></line>
                    `;
                }
            }

            // Open file picker when clicking drop area
            dropArea.addEventListener("click", () => {
                fileInput.click();
            });

            // Handle selected file when using file picker
            fileInput.addEventListener("change", function () {
                if (this.files && this.files[0]) {
                    updateFileInfo(this.files[0]);
                }
            });

            // Clear selected file when clicking X button
            clearFile.addEventListener("click", function (e) {
                e.stopPropagation();
                updateFileInfo(null);
                pollStatus();
            });

            // Initialize button state when page loads
            document.addEventListener("DOMContentLoaded", function () {
                const uploadButton = document.getElementById("upload-button");
                uploadButton.disabled = fileInput.files.length === 0;
            });

            function updateStatus({
                current,
                error,
                exporter,
                history = [],
                message,
                report,
                status,
            }) {
                const currentStatus = document.getElementById("current-status");
                const historyContainer =
                    document.getElementById("history-container");
                const uploadButton = document.getElementById("upload-button");

                if (current) status = "processing";

                // Update current status
                switch (status) {
                    case "uploading":
                        currentStatus.classList.add("processing");
                        currentStatus.innerHTML = `
                            <div class="spinner"></div>
                            <span>Uploading diagnostic bundle...</span>
                        `;
                        break;
                    case "processing":
                        currentStatus.classList.add("processing");
                        currentStatus.innerHTML = `
                            <div class="spinner"></div>
                            <span>${message || "Processing diagnostic..."}</span>
                        `;
                        break;
                    case "ready":
                        currentStatus.classList.remove("processing");
                        currentStatus.classList.add("ready");
                        currentStatus.innerHTML = `▶️ Ready, exporting to: ${exporter}`;
                        break;
                }

                // Update job history
                if (history && history.length > 0) {
                    historyContainer.innerHTML = "";
                    // Reverse the array to show newest entries first
                    [...history].reverse().forEach((job) => {
                        const historyItem = document.createElement("div");
                        historyItem.className = "status-box";

                        if (job.Completed) {
                            const completedJob = job.Completed;
                            historyItem.classList.add("success");
                            let message = `✅ Diagnostic processing complete!`;

                            if (completedJob.report) {
                                const report = completedJob.report;
                                message += `<p><b>Diagnostic ID:</b> <a target="_blank" href="${report.kibana_link}">${report.id}</a></p>`;
                                message += `<p><b>Filename:</b> ${completedJob.filename}</p>`;
                                message += `<p><b>Product:</b> ${report.product}</p>`;
                                message += `<p><b>Ingested:</b> ${report.docs.created} documents</p>`;
                            }

                            historyItem.innerHTML = message;
                        } else if (job.Failed) {
                            const failedJob = job.Failed;
                            historyItem.classList.add("error");
                            historyItem.innerHTML = `<p>🛑 <b>Error:</b> ${failedJob.error || "Processing failed"}</p><p><b>Filename:</b> ${failedJob.filename}</p>`;
                        }

                        historyContainer.appendChild(historyItem);
                    });
                }
            }

            function pollStatus() {
                fetch(`/status`)
                    .then((response) => response.json())
                    .then((data) => {
                        updateStatus({
                            current: data.current,
                            error: data.error,
                            exporter: data.exporter,
                            history: data.history || [],
                            message: data.message || data.progress,
                            status: data.status,
                        });
                    })
                    .catch((error) => {
                        console.error("Polling error:", error);
                    })
                    .finally(() => {
                        setTimeout(pollStatus, 2000);
                    });
            }

            document
                .getElementById("upload-form")
                .addEventListener("submit", function (e) {
                    e.preventDefault();
                    const formData = new FormData(this);
                    updateStatus({ status: "uploading" });
                    fetch("/upload", {
                        method: "POST",
                        body: formData,
                    })
                        .then((response) => {
                            response.json().then((body) => {
                                updateStatus(body);
                                updateFileInfo(null);
                            });
                        })
                        .catch((error) => {
                            updateStatus({ status: "error", error });
                            updateFileInfo(null);
                        });
                });

            setTimeout(pollStatus, 500);
        </script>
    </body>
</html>
