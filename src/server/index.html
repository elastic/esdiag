<!doctype html>
<html>
    <head>
        <title>Elastic Stack Diagnostics Upload</title>
        <style>
            body {
                font-family: "Inter", BlinkMacSystemFont, Helvetica, Arial, sans-serif;
                padding: 0px;
                margin: 0px;
            }
            code {
                background-color: rgb(246, 249, 252);
                border-radius: 4px;
                color: rgb(107, 60, 159);
                font-family: "Roboto Mono", Menlo, Courier, monospace;
                font-size: 0.9em;
                font-weight: 600;
                padding-block: 0.2em;
                padding-inline: 0.5em;
            }
            h2 {
                color: rgb(17, 28, 44);
                font-weight: 600;
                word-break: break-word;
                font-size: 1.1429rem;
                line-height: 40px;
                margin: 0px;
            }
            .links {
                display: flex;
                align-items: flex-start;
                justify-content: space-between;
            }
            .header {
                display: flex;
                align-items: center;
                justify-content: space-between;
                padding: 0px 12px;
                height: 48px;
                background-color: #0b1628;
                color: #ffffff;
            }
            .header h1 {
                display: inline-block;
                color: #ffffff;
                font-size: 1.2em;
                font-weight: 200;
                margin: 0px;
            }
            .logo {
                display: inline-block;
                vertical-align: middle;
                width: 24px;
                height: 24px;
                margin: 0px 4px 6px 8px;
            }
            .content {
                max-width: 640px;
                margin: 0 auto;
                padding: 24px 12px;
            }
            .upload-form {
                background-color: #ffffff;
                border-radius: 4px;
                border: 1px solid #e3e8f2;
                padding: 16px;
            }
            .button {
                background-color: #d1e1ff;
                border-radius: 4px;
                border: none;
                color: #1339ab;
                cursor: pointer;
                margin-top: 10px;
                padding: 10px 15px;
            }
            .button:hover {
                background-color: #b7d0fb;
            }
            .button:disabled {
                background-color: #ecebf9;
                color: #798eaf;
                cursor: not-allowed;
            }
            #status-box {
                margin-top: 12px;
            }
            .status-box {
                padding: 16px;
                border-radius: 4px;
                max-width: 640px;
                margin: 8px auto;
            }
            @keyframes pushIn {
                0% {
                    transform: translateY(-20px);
                }
                50% {
                    transform: translateY(5px);
                }
                100% {
                    transform: translateY(0);
                }
            }
            .history-item {
                animation: pushIn 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
                transform-origin: top center;
                position: relative;
                transition: transform 0.2s ease;
                cursor: pointer;
            }
            .history-item:hover {
                transform: translateY(-2px);
            }
            #ready-status {
                background-color: #e3e8f2;
                color: #516381;
                font-weight: 500;
            }
            #current-status {
                background-color: #cfeef7;
                color: #0f658a;
            }
            #current-status.hidden {
                display: none;
            }
            .success {
                background-color: #c9f3e3;
                color: #09724d;
            }
            .error {
                background-color: #fdddd8;
                color: #a71627;
            }
            .processing {
                background-color: #cfeef7;
                color: #0f658a;
            }
            .status-box {
                transition:
                    background-color 0.3s ease,
                    color 0.3s ease,
                    transform 0.2s ease;
            }
            .spinner {
                animation: spin 1.2s cubic-bezier(0.5, 0, 0.5, 1) infinite;
                border-radius: 50%;
                border: 3px solid rgba(15, 101, 138, 0.2);
                border-top: 3px solid #0f658a;
                display: inline-block;
                height: 16px;
                margin-right: 8px;
                vertical-align: middle;
                width: 16px;
                position: relative;
                top: -1px;
            }
            @keyframes spin {
                0% {
                    transform: rotate(0deg);
                }
                100% {
                    transform: rotate(360deg);
                }
            }
            .drop-area {
                border-radius: 8px;
                border: 2px dashed #e3e8f2;
                cursor: pointer;
                margin-bottom: 15px;
                padding: 25px;
                position: relative;
                text-align: center;
                transition: all 0.3s ease;
            }
            .drop-area.drag-over {
                background-color: #f0f5ff;
                border-color: #1339ab;
            }
            .upload-progress-container {
                position: absolute;
                bottom: 0;
                left: 0;
                width: 100%;
                height: 5px;
                overflow: hidden;
                border-bottom-left-radius: 8px;
                border-bottom-right-radius: 8px;
                opacity: 0;
                transition: opacity 0.3s ease;
            }
            .upload-progress-container.active {
                opacity: 1;
            }
            .upload-progress-bar {
                height: 100%;
                width: 0%;
                background-color: #0b64dd;
                transition: width 0.3s ease;
            }
            .upload-progress-text {
                position: absolute;
                bottom: 8px;
                right: 8px;
                color: #0b64dd;
                font-size: 12px;
                font-weight: bold;
                opacity: 0;
                transition: opacity 0.3s ease;
            }
            .upload-progress-text.active {
                opacity: 1;
            }
            .file-input {
                display: none;
            }
            .file-icon {
                align-items: center;
                color: #516381;
                display: flex;
                height: 60px;
                justify-content: center;
                margin: 0 auto 15px;
                width: 60px;
            }
            .file-icon svg {
                height: 40px;
                width: 40px;
            }
            .subdued {
                color: #516381;
                font-size: 0.9em;
                margin-top: 10px;
            }
            .file-info {
                align-items: center;
                background-color: rgb(246, 249, 252);
                border-radius: 4px;
                display: flex;
                justify-content: center;
                margin-top: 15px;
                padding: 8px 12px;
            }
            .file-name {
                margin-right: 10px;
                max-width: 80%;
                overflow: hidden;
                text-overflow: ellipsis;
                word-break: break-all;
            }
            .clear-button {
                align-items: center;
                border-radius: 50%;
                color: #1339ab;
                cursor: pointer;
                display: flex;
                font-weight: bold;
                height: 22px;
                justify-content: center;
                width: 22px;
            }
            .clear-button:hover {
                background-color: #b7d0fb;
            }
            .hidden {
                display: none;
            }
            .user-menu {
                position: absolute;
                top: 100%;
                right: 0;
                background: white;
                border: 1px solid #dce2ea;
                border-radius: 4px;
                box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
                padding: 12px;
                min-width: 180px;
                margin-top: 8px;
                display: none;
                z-index: 1000;
            }
            .user-circle:hover .user-menu {
                display: block;
            }
            .user-menu-item {
                padding: 8px;
                font-size: 14px;
                font-weight: 400;
                color: #101c3f;
                white-space: nowrap;
                display: flex;
                align-items: center;
                text-decoration: none;
            }
            .user-menu-header {
                padding: 8px;
                font-size: 14px;
                font-weight: 600;
                color: #101c3f;
                white-space: nowrap;
                display: flex;
                align-items: center;
                text-decoration: none;
                border-bottom: 1px solid #e3e8f2;
            }
            .user-menu-item:hover {
                background-color: #f5f7fa;
                border-radius: 4px;
            }
            .icon {
                width: 24px;
                height: 24px;
                margin: 0px 12px;
                align-self: right;
            }
            #kibana {
                position: relative;
            }
            #kibana:hover .user-menu {
                display: block;
            }
            .github {
                color: #b7d0fb;
            }
            .user-circle {
                background-color: #45a8ff;
                border-radius: 50%;
                color: #153385;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 12px;
                font-weight: 450;
                margin: 0px 12px;
                height: 24px;
                width: 24px;
                position: relative;
                cursor: pointer;
            }
        </style>
    </head>

                    </div>
                    <input type="submit" value="Upload" class="button" id="upload-button" disabled />
                </form>
            </div>
            <div id="status-box">
                <div id="ready-status" class="status-box ready">⏹️ Connecting...</div>
                <div id="current-status" class="status-box processing hidden"></div>
                <div id="history-container"></div>
            </div>
        </div>

        <script>
            // User information
            function setUserInfo(username) {
                document.getElementById("user-circle").firstChild.textContent = username
                    ? username.charAt(0).toUpperCase()
                    : "_";
                document.getElementById("username-display").textContent = username || "Anonymous";
            }

            function updateKibanaUrl(kibanaUrl) {
                const kibanaLink = document.querySelector("#kibana a");
                const kibanaMenu = document.querySelector("#kibana .user-menu-item");

                if (kibanaLink && kibanaUrl) {
                    kibanaLink.href = `${kibanaUrl}/app/dashboards#/view/2c8cd284-79ef-4787-8b79-0030e0df467b`;
                }

                if (kibanaMenu && kibanaUrl) {
                    kibanaMenu.textContent = kibanaUrl;
                }
            }

            // File upload handling
            const dropArea = document.getElementById("drop-area");
            const fileInput = document.getElementById("file-input");
            const fileInfo = document.getElementById("file-info");
            const fileName = document.getElementById("file-name");
            const clearFile = document.getElementById("clear-file");
            const uploadInstructions = document.getElementById("upload-instructions");

            // Prevent default drag behaviors
            ["dragenter", "dragover", "dragleave", "drop"].forEach((eventName) => {
                dropArea.addEventListener(eventName, preventDefaults, false);
                document.body.addEventListener(eventName, preventDefaults, false);
            });

            function preventDefaults(e) {
                e.preventDefault();
                e.stopPropagation();
            }

            // Highlight drop area when item is dragged over it
            ["dragenter", "dragover"].forEach((eventName) => {
                dropArea.addEventListener(eventName, highlight, false);
            });

            ["dragleave", "drop"].forEach((eventName) => {
                dropArea.addEventListener(eventName, unhighlight, false);
            });

            function highlight() {
                dropArea.classList.add("drag-over");
            }

            function unhighlight() {
                dropArea.classList.remove("drag-over");
            }

            // Handle dropped files
            dropArea.addEventListener("drop", handleDrop, false);

            function handleDrop(e) {
                const dt = e.dataTransfer;
                const files = dt.files;
                handleFiles(files);
            }

            function handleFiles(files) {
                if (files.length > 0) {
                    fileInput.files = files;
                    updateFileInfo(files[0]);
                }
            }

            function updateFileInfo(file) {
                const uploadButton = document.getElementById("upload-button");
                const fileIcon = document.querySelector(".file-icon");
                const currentStatus = document.getElementById("current-status");
                const isUploading = currentStatus && currentStatus.textContent.includes("Uploading");

                // Don't clear the file if we're currently uploading
                if (isUploading && !file) return;

                if (file) {
                    fileName.textContent = file.name;
                    fileInfo.classList.remove("hidden");
                    uploadButton.disabled = false;
                    uploadInstructions.classList.add("hidden");
                    fileIcon.style.color = "#1339ab"; // Change to button text blue

                    // Change the icon to a check mark
                    document.querySelector(".file-icon svg").innerHTML = `
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                        <polyline points="14 2 14 8 20 8"></polyline>
                        <path d="M9 15L11 17L15 13"></path>
                    `;
                } else {
                    fileInput.value = "";
                    fileInfo.classList.add("hidden");
                    uploadButton.disabled = true;
                    uploadInstructions.classList.remove("hidden");
                    fileIcon.style.color = "#516381"; // Reset to original color

                    // Reset to upload icon
                    document.querySelector(".file-icon svg").innerHTML = `
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                        <polyline points="14 2 14 8 20 8"></polyline>
                        <line x1="12" y1="18" x2="12" y2="12"></line>
                        <line x1="9" y1="15" x2="15" y2="15"></line>
                    `;
                }
            }

            // Open file picker when clicking drop area
            dropArea.addEventListener("click", () => {
                fileInput.click();
            });

            // Handle selected file when using file picker
            fileInput.addEventListener("change", function () {
                if (this.files && this.files[0]) {
                    updateFileInfo(this.files[0]);
                }
            });

            // Clear selected file when clicking X button
            clearFile.addEventListener("click", function (e) {
                e.stopPropagation();
                updateFileInfo(null);
                pollStatus();
            });

            // Initialize button state when page loads
            document.addEventListener("DOMContentLoaded", function () {
                const uploadButton = document.getElementById("upload-button");
                uploadButton.disabled = fileInput.files.length === 0;
            });

            function updateStatus({
                current,
                error,
                exporter,
                history = [],
                message,
                report,
                status,
                user,
                queue = {},
            }) {
                setUserInfo(user);
                const readyStatus = document.getElementById("ready-status");
                const currentStatus = document.getElementById("current-status");
                const historyContainer = document.getElementById("history-container");
                const uploadButton = document.getElementById("upload-button");
                const dropArea = document.getElementById("drop-area");

                // Get queue size if available
                const queueSize = queue?.size || 0;

                // Update ready status box - always visible, always gray
                readyStatus.className = "status-box";
                if (queueSize > 1) {
                    readyStatus.innerHTML = `⏸️ Queue: ${queueSize}`;
                } else if (current) {
                    readyStatus.innerHTML = `🔄 Processing`;
                } else {
                    readyStatus.innerHTML = `▶️ Ready, exporting to ${exporter}`;
                }

                // Reset upload-related UI elements
                if (status !== "uploading") {
                    dropArea.style.borderColor = "";
                    dropArea.style.pointerEvents = "";
                }

                // Handle current status box visibility and content
                if (current && (current.user === user || current.user === null)) {
                    // Show processing status only for current user's job
                    currentStatus.classList.remove("hidden");
                    currentStatus.innerHTML = `
                        <div class="spinner"></div>
                        <span><b>Processing:</b> ${current.filename || "diagnostic"}</span>
                    `;
                } else {
                    // Hide status box if no current activity for this user
                    currentStatus.classList.add("hidden");
                }

                // Update job history
                if (history && history.length > 0) {
                    // Get current history IDs to compare
                    const currentHistoryIds = Array.from(historyContainer.querySelectorAll("[data-job-id]")).map((el) =>
                        el.getAttribute("data-job-id"),
                    );

                    // Store the previous history state in a data attribute for comparison
                    const previousHistoryJson = historyContainer.getAttribute("data-history-json") || "[]";
                    let previousHistory;
                    try {
                        previousHistory = JSON.parse(previousHistoryJson);
                    } catch (e) {
                        previousHistory = [];
                    }

                    // Compare current history with previous to determine if we have new items
                    const historyJson = JSON.stringify(history);
                    const hasNewItems = previousHistoryJson !== historyJson;

                    // Update stored history
                    historyContainer.setAttribute("data-history-json", historyJson);

                    // Preserve history container if it exists
                    const historyItems = [];

                    // Reverse the array to show newest entries first
                    [...history].reverse().forEach((job, index) => {
                        const historyItem = document.createElement("div");
                        historyItem.className = "status-box history-item";

                        // Add job ID as data attribute for comparison
                        const jobId = job.Completed?.id || job.Failed?.id || "";
                        historyItem.setAttribute("data-job-id", jobId);

                        // Get timestamp for comparison
                        const timestamp = job.Completed?.timestamp || job.Failed?.timestamp || Date.now();
                        historyItem.setAttribute("data-timestamp", timestamp);

                        // Check if this item is new (wasn't in the previous history)
                        const isNewItem = !previousHistory.some(
                            (prevJob) => prevJob.Completed?.id === jobId || prevJob.Failed?.id === jobId,
                        );

                        // Apply animation only to new items
                        if (hasNewItems && isNewItem && jobId) {
                            historyItem.style.animationDelay = index * 0.08 + "s";
                        }

                        if (job.Completed) {
                            const completedJob = job.Completed;
                            historyItem.classList.add("success");
                            let message = `✅ Processing complete!`;

                            if (completedJob.report) {
                                const report = completedJob.report;
                                message += `<p><b>Diagnostic ID:</b> <a target="_blank" href="${report.kibana_link}">${report.id}</a></p>`;
                                message += `<p><b>Filename:</b> ${completedJob.filename}</p>`;
                                message += `<p><b>Product:</b> ${report.product}</p>`;
                                message += `<p><b>Ingested:</b> ${report.docs.created} documents</p>`;
                            }

                            historyItem.innerHTML = message;
                        } else if (job.Failed) {
                            const failedJob = job.Failed;
                            historyItem.classList.add("error");
                            historyItem.innerHTML = `🛑 <b>Error:</b> ${failedJob.error || "Processing failed"}<p><b>Filename:</b> ${failedJob.filename}</p>`;
                            historyItem.title = "Click for more details";
                        }

                        historyItems.push(historyItem);
                    });

                    // Always clear and rebuild if there are new items
                    if (hasNewItems || historyContainer.children.length !== historyItems.length) {
                        historyContainer.innerHTML = "";
                        historyItems.forEach((item) => {
                            historyContainer.appendChild(item);
                        });
                    }
                }
            }

            function pollStatus() {
                fetch(`/status`)
                    .then((response) => response.json())
                    .then((data) => {
                        updateStatus({
                            current: data.current,
                            error: data.error,
                            exporter: data.exporter,
                            history: data.history || [],
                            message: data.message || data.progress,
                            status: data.status,
                            user: data.user,
                            queue: data.queue,
                        });

                        // Update kibana URL if available
                        if (data.kibana) {
                            updateKibanaUrl(data.kibana);
                        }
                    })
                    .catch((error) => {
                        console.error("Polling error:", error);
                    })
                    .finally(() => {
                        setTimeout(pollStatus, 2000);
                    });
            }

            document.getElementById("upload-form").addEventListener("submit", function (e) {
                e.preventDefault();
                const formData = new FormData(this);
                // Keep the file visible while uploading
                const currentFile = fileInput.files[0];
                updateStatus({ status: "uploading" });

                // Use XMLHttpRequest to track upload progress
                const xhr = new XMLHttpRequest();
                const progressBar = document.getElementById("upload-progress-bar");
                const progressContainer = document.getElementById("upload-progress-container");
                const progressText = document.getElementById("upload-progress-text");

                // Show progress elements
                progressContainer.classList.add("active");
                progressText.classList.add("active");

                // Reset progress bar
                progressBar.style.width = "0%";
                progressText.textContent = "0%";

                xhr.upload.addEventListener("progress", function (event) {
                    if (event.lengthComputable) {
                        const percentComplete = (event.loaded / event.total) * 100;
                        const percentFormatted = Math.round(percentComplete) + "%";

                        progressBar.style.width = percentFormatted;
                        progressText.textContent = percentFormatted;
                    }
                });

                xhr.onload = function () {
                    if (xhr.status >= 200 && xhr.status < 300) {
                        const body = JSON.parse(xhr.responseText);
                        // Make sure to pass queue information from the response
                        updateStatus({
                            ...body,
                            queue: body.queue || {},
                        });
                        // Reset progress bar after a delay to show completion
                        setTimeout(() => {
                            progressBar.style.width = "0%";
                            progressContainer.classList.remove("active");
                            progressText.classList.remove("active");
                            // Only clear file info after upload is complete and progress bar is hidden
                            updateFileInfo(null);
                            // Re-enable drop area
                            document.getElementById("drop-area").style.pointerEvents = "";
                        }, 1000);
                    } else {
                        updateStatus({
                            status: "error",
                            error: "Upload failed with status: " + xhr.status,
                        });
                        // Hide progress elements
                        progressContainer.classList.remove("active");
                        progressText.classList.remove("active");
                        // Clear file info after error
                        updateFileInfo(null);
                        // Re-enable drop area
                        document.getElementById("drop-area").style.pointerEvents = "";
                    }
                };

                xhr.onerror = function () {
                    updateStatus({
                        status: "error",
                        error: "Upload failed",
                    });
                    // Hide progress elements
                    progressContainer.classList.remove("active");
                    progressText.classList.remove("active");
                    // Clear file info after error
                    updateFileInfo(null);
                    // Re-enable drop area
                    document.getElementById("drop-area").style.pointerEvents = "";
                };

                xhr.open("POST", "/upload", true);
                xhr.send(formData);
            });

            setTimeout(pollStatus, 200);
        </script>
    </body>
</html>
