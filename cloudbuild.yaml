# Defaults, override with --substitutions flag
substitutions:
  _VERSION: "latest"
steps:
  - name: "gcr.io/cloud-builders/docker"
    id: "build"
    args:
      [
        "build",
        "-t",
        "us-west1-docker.pkg.dev/elastic-ce-tools/esdiag/esdiag:latest",
        "-t",
        "us-west1-docker.pkg.dev/elastic-ce-tools/esdiag/esdiag:${_VERSION}",
        ".",
      ]

  - name: "gcr.io/cloud-builders/docker"
    id: "push-latest"
    args:
      ["push", "us-west1-docker.pkg.dev/elastic-ce-tools/esdiag/esdiag:latest"]

  - name: "gcr.io/cloud-builders/docker"
    id: "push-versioned"
    args:
      [
        "push",
        "us-west1-docker.pkg.dev/elastic-ce-tools/esdiag/esdiag:${_VERSION}",
      ]
serviceAccount: "projects/elastic-ce-tools/serviceAccounts/esdiag-cloud-build@elastic-ce-tools.iam.gserviceaccount.com"
# logsBucket: 'gs://YOUR_LOGS_BUCKET' # Optional, but good practice
options:
  logging: CLOUD_LOGGING_ONLY # GCS_ONLY # If using logsBucket, set logging to GCS_ONLY
